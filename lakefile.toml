name = "fermat"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Fermat"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "flt-regular"
git = "https://github.com/leanprover-community/flt-regular.git"
rev = "master"

[[lean_lib]]
name = "Fermat"
